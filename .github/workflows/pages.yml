name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject SHEET_URL into index.html
        env:
          SHEET_URL: ${{ secrets.SHEET_URL }}
        run: |
          if [ -n "$SHEET_URL" ]; then
            python3 -c "
import sys, json
url = sys.argv[1]
with open('index.html') as f: content = f.read()
content = content.replace('window.BTB_SHEET_URL = \"\";', 'window.BTB_SHEET_URL = ' + json.dumps(url) + ';', 1)
with open('index.html', 'w') as f: f.write(content)
print('SHEET_URL injected into index.html.')
" "$SHEET_URL"
          else
            echo "No SHEET_URL secret — site will run in offline mode."
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
