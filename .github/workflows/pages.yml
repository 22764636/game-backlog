name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Write SHEET_URL
        env:
          SHEET_URL: ${{ secrets.SHEET_URL }}
        run: |
          printf 'window.BTB_SHEET_URL = "%s";\n' "$SHEET_URL" > btb-url.js
          echo "btb-url.js written (${#SHEET_URL} chars in URL)"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
